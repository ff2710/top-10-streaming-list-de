name: Update Manifest
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run update
      - name: Commit updated manifest
        run: |
          git config user.email "bot@example.com"
          git config user.name "ManifestBot"
          git add manifest.json
          git diff --cached --quiet || git commit -m "chore: update manifest $(date -u +%F)"
          git push
